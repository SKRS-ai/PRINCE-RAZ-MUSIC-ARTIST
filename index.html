<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PRINCE RAZ | Official M3-H21 Portal</title>
    <style>
        /* ROYAL CINEMATIC STYLES */
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Montserrat:wght@300;600&display=swap');

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #000;
            color: #ffffff;
            font-family: 'Montserrat', sans-serif;
            overflow: hidden;
        }

        /* PREMIUM VIDEO ENGINE */
        .video-background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            filter: brightness(40%) sepia(20%);
        }

        .video-background iframe {
            width: 100vw;
            height: 100vh;
            transform: scale(1.5);
            pointer-events: none;
        }

        /* GOLDEN UI LAYOUT */
        .overlay {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: linear-gradient(to top, rgba(0,0,0,0.9), transparent, rgba(0,0,0,0.9));
            text-align: center;
            padding: 20px;
        }

        .brand-hub {
            margin-bottom: 60px;
        }

        .brand-hub h1 {
            font-family: 'Cinzel', serif;
            font-size: clamp(2.5rem, 8vw, 6rem);
            color: #D4AF37; /* Metallic Gold */
            margin: 0;
            letter-spacing: 15px;
            text-transform: uppercase;
            text-shadow: 0 0 20px rgba(212, 175, 55, 0.3);
        }

        .royal-divider {
            height: 1px;
            width: 100px;
            background: #D4AF37;
            margin: 20px auto;
        }

        /* NAVIGATION BUTTONS */
        .nav-stack {
            display: flex;
            flex-direction: column;
            gap: 20px;
            width: 100%;
            max-width: 350px;
        }

        .btn-royal {
            text-decoration: none;
            color: #D4AF37;
            border: 1px solid #D4AF37;
            padding: 15px;
            font-size: 0.75rem;
            letter-spacing: 4px;
            text-transform: uppercase;
            transition: all 0.5s ease;
            background: rgba(0,0,0,0.3);
        }

        .btn-royal:hover {
            background: #D4AF37;
            color: #000;
            box-shadow: 0 0 25px rgba(212, 175, 55, 0.4);
            transform: translateY(-3px);
        }

        .btn-main {
            background: #D4AF37;
            color: #000;
            font-weight: 700;
        }

        .btn-main:hover {
            background: transparent;
            color: #D4AF37;
        }

        /* FOOTER */
        footer {
            position: absolute;
            bottom: 40px;
            font-size: 0.6rem;
            letter-spacing: 6px;
            color: #D4AF37;
            opacity: 0.6;
        }
    </style>
</head>
<body>

    <div class="video-background">
        <iframe 
            src="https://www.youtube.com/embed/VIDEO_ID?autoplay=1&loop=1&playlist=VIDEO_ID&controls=0&mute=1&modestbranding=1" 
            frameborder="0" 
            allow="autoplay; encrypted-media">
        </iframe>
    </div>

    <div class="overlay">
        <header class="brand-hub">
            <h1>PRINCE RAZ</h1>
            <div class="royal-divider"></div>
            <p style="letter-spacing: 8px; font-size: 0.7rem; opacity: 0.8;">M3-HACKATHON-2021</p>
        </header>

        <nav class="nav-stack">
            <a href="epk.html" class="btn-royal btn-main">THE PALACE [EPK]</a>
            <a href="#" class="btn-royal">VISUAL COLLECTION</a>
            <a href="#" class="btn-royal">STREAM AUDIO</a>
            <a href="#" class="btn-royal">CONTACT / BOOKING</a>
        </nav>

        <footer>
            SKR-PR-EPK // CINEMATIC AUDIO EXPERIENCE
        </footer>
    </div>

</body>
</html>
